<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Registracija — Pronađi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
<div class="auth-wrap">
  <a href="index.html" class="logo auth-logo">Pronađi<span>.</span></a>
  <div class="auth-card">
    <h2 class="auth-title">Otvori račun</h2>
    <p class="auth-sub">Počni pratiti nekretnine odmah</p>
    <div class="form-err" id="formErr" style="display:none"></div>
    <div class="form-group">
      <label class="form-label">Ime i prezime</label>
      <input type="text" class="form-input" id="fullName" placeholder="Marko Kovačević" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">Naziv agencije <span style="color:var(--soft);font-weight:400">(opcionalno)</span></label>
      <input type="text" class="form-input" id="agencyName" placeholder="RE/MAX Rijeka">
    </div>
    <div class="form-group">
      <label class="form-label">Email adresa</label>
      <input type="email" class="form-input" id="email" placeholder="tvoj@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Lozinka <span style="color:var(--soft);font-weight:400">(min. 8 znakova)</span></label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn btn-primary btn-full btn-lg" id="submitBtn" onclick="handleRegister()">Otvori račun</button>
    <p class="auth-switch">Već imaš račun? <a href="login.html">Prijavi se</a></p>
  </div>
</div>
<script src="js/api.js"></script>
<script>
if (localStorage.getItem('token')) window.location.href = 'dashboard.html';
async function handleRegister() {
  const full_name   = document.getElementById('fullName').value.trim();
  const agency_name = document.getElementById('agencyName').value.trim();
  const email       = document.getElementById('email').value.trim();
  const password    = document.getElementById('password').value;
  const btn         = document.getElementById('submitBtn');
  if (!full_name||!email||!password) return showErr('Ispuni obavezna polja.');
  if (password.length < 8) return showErr('Lozinka mora imati najmanje 8 znakova.');
  btn.disabled=true; btn.textContent='Kreiranje računa...';
  try {
    const data = await api.post('/auth/register', { full_name, agency_name, email, password });
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = 'checkout.html';
  } catch(err) { showErr(err.message); btn.disabled=false; btn.textContent='Otvori račun'; }
}
function showErr(msg) { const e=document.getElementById('formErr'); e.textContent=msg; e.style.display='block'; }
document.addEventListener('keydown', e => { if(e.key==='Enter') handleRegister(); });
</script>
</body>
</html>
