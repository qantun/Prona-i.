name: Debug oglas privatni
"on":
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
      - name: Debug
        run: |
          python3 << 'EOF'
          from playwright.sync_api import sync_playwright
          import re

          with sync_playwright() as p:
            browser = p.chromium.launch(headless=True)
            page = browser.new_page()
            page.set_extra_http_headers({'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'})
            page.goto('https://www.njuskalo.hr/nekretnine', wait_until='networkidle', timeout=30000)
            html = page.content()
            links = re.findall(r'href="(/nekretnine/[^"]*oglas-\d+)"', html)
            
            for link in links[:3]:
              url = 'https://www.njuskalo.hr' + link
              print("\n=== Oglas:", url)
              page2 = browser.new_page()
              page2.goto(url, wait_until='networkidle', timeout=30000)
              html2 = page2.content()
              page2.close()
              
              for kw in ['privat', 'agenc', 'oglasiva', 'advertiser', 'seller-type', 'user-type']:
                idx = html2.lower().find(kw)
                if idx > 0:
                  print(f"[{kw}]:", html2[idx-100:idx+200])
          
          browser.close()
          EOF
