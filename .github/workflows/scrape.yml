name: Scrape Njuskalo
"on":
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Scrape Njuskalo
        run: |
          python3 << 'EOF'
          from playwright.sync_api import sync_playwright
          import re, json, urllib.request

          API_URL = "https://xn--pronai-f3a.eu/api/listings/import"
          API_SECRET = "pronadji_scraper_secret_2026"

          all_listings = []

          with sync_playwright() as p:
            browser = p.chromium.launch(headless=True)
            
            for page_num in range(1, 11):
              page_url = f"https://www.njuskalo.hr/nekretnine?page={page_num}"
              print(f"Scraping: {page_url}")
              try:
                page = browser.new_page()
                page.set_extra_http_headers({
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                })
                page.goto(page_url, wait_until='networkidle', timeout=30000)
                html = page.content()
                page.close()

                links = list(set(re.findall(r'href="(/nekretnine/[^"]*oglas-\d+)"', html)))
                print(f"  Pronađeno {len(links)} oglasa")
                if len(links) == 0:
                  print("  Nema više oglasa, zaustavljam.")
                  break

                for link in links:
                  oglas_id = re.search(r'oglas-(\d+)', link)
                  if not oglas_id:
                    continue
                  title = link.split('/')[-1].rsplit('-oglas-', 1)[0].replace('-', ' ').title()
                  m2 = re.search(r'(\d+[\.,]\d+|\d+)[- ]?[Mm]2', title)
                  area = float(m2.group(1).replace(',','.')) if m2 else None
                  cities = ['Zagreb', 'Split', 'Rijeka', 'Zadar', 'Osijek', 'Dubrovnik', 'Pula', 'Varazdin']
                  city = next((c for c in cities if c.lower() in title.lower()), None)

                  all_listings.append({
                    'external_id': f"njuskalo_{oglas_id.group(1)}",
                    'source': 'njuskalo',
                    'title': title,
                    'url': f"https://www.njuskalo.hr{link}",
                    'price': None,
                    'location': city,
                    'area_m2': area,
                    'property_type': 'stan',
                    'is_private': True
                  })
              except Exception as e:
                print(f"  Greška: {e}")
                break

            browser.close()

          seen = set()
          unique = []
          for l in all_listings:
            if l['external_id'] not in seen:
              seen.add(l['external_id'])
              unique.append(l)

          print(f"\nUkupno jedinstvenih oglasa: {len(unique)}")

          for i in range(0, len(unique), 50):
            batch = unique[i:i+50]
            data = json.dumps({'listings': batch, 'secret': API_SECRET}).encode('utf-8')
            req = urllib.request.Request(API_URL, data=data, headers={'Content-Type': 'application/json'})
            try:
              resp = urllib.request.urlopen(req, timeout=15)
              print(f"Batch {i//50+1}: {resp.read().decode()}")
            except Exception as e:
              print(f"API greška: {e}")
          EOF
