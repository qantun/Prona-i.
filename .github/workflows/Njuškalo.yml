name: Debug lista
"on":
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
      - name: Debug
        run: |
          python3 << 'EOF'
          from playwright.sync_api import sync_playwright
          import re

          with sync_playwright() as p:
            browser = p.chromium.launch(headless=True)
            page = browser.new_page()
            page.set_extra_http_headers({'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64)'})
            page.goto('https://www.njuskalo.hr/nekretnine', wait_until='networkidle', timeout=30000)
            html = page.content()
            browser.close()

          idx = html.lower().find('oglas-47113454')
          if idx > 0:
            print(html[idx-500:idx+1000])
          else:
            idx2 = html.lower().find('/nekretnine/')
            print(html[idx2-200:idx2+1500])
          EOF
