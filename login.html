<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prijava — Pronađi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
<div class="auth-wrap">
  <a href="index.html" class="logo auth-logo">Pronađi<span>.</span></a>
  <div class="auth-card">
    <h2 class="auth-title">Dobro došao nazad</h2>
    <p class="auth-sub">Prijavi se na svoj račun</p>
    <div class="form-err" id="formErr" style="display:none"></div>
    <div class="form-group">
      <label class="form-label">Email adresa</label>
      <input type="email" class="form-input" id="email" placeholder="tvoj@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Lozinka</label>
      <input type="password" class="form-input" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full btn-lg" id="submitBtn" onclick="handleLogin()">Prijava</button>
    <p class="auth-switch">Nemaš račun? <a href="register.html">Registriraj se</a></p>
  </div>
</div>
<script src="js/api.js"></script>
<script>
if (localStorage.getItem('token')) window.location.href = 'dashboard.html';
async function handleLogin() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submitBtn');
  if (!email || !password) return showErr('Ispuni sva polja.');
  btn.disabled=true; btn.textContent='Prijava...';
  try {
    const data = await api.post('/auth/login', { email, password });
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = 'dashboard.html';
  } catch(err) { showErr(err.message); btn.disabled=false; btn.textContent='Prijava'; }
}
function showErr(msg) { const e=document.getElementById('formErr'); e.textContent=msg; e.style.display='block'; }
document.addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
</script>
</body>
</html>
